<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C5CE7"/>
      <stop offset="100%" style="stop-color:#A855F7"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rectangle -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Document shape (white, slightly transparent) -->
  <rect x="110" y="60" width="292" height="370" rx="24" fill="white" opacity="0.95"/>
  <!-- Folded corner -->
  <path d="M 330 60 L 402 132 L 330 132 Z" fill="#E0D4FC"/>
  <!-- Bold heading bar -->
  <rect x="150" y="170" width="180" height="16" rx="8" fill="#6C5CE7"/>
  <!-- Text lines -->
  <rect x="150" y="210" width="212" height="10" rx="5" fill="#B8B0D0"/>
  <rect x="150" y="235" width="180" height="10" rx="5" fill="#B8B0D0"/>
  <rect x="150" y="260" width="200" height="10" rx="5" fill="#B8B0D0"/>
  <!-- Code block -->
  <rect x="150" y="290" width="212" height="50" rx="8" fill="#F0ECFF"/>
  <rect x="166" y="305" width="100" height="6" rx="3" fill="#6C5CE7"/>
  <rect x="166" y="320" width="140" height="6" rx="3" fill="#A855F7"/>
  <!-- More text -->
  <rect x="150" y="360" width="170" height="10" rx="5" fill="#B8B0D0"/>
  <rect x="150" y="385" width="130" height="10" rx="5" fill="#B8B0D0"/>
  <!-- "mdr" bold text at bottom -->
  <text x="256" y="480" text-anchor="middle" font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="800" fill="white" letter-spacing="6">mdr</text>
</svg>
